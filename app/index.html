<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>rmsai — hospital worklist</title>
  <!-- LiveKit browser client (control-plane data channel for the live worklist). -->
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"></script>
  <style>
    :root { color-scheme: light dark; }
    body { font: 14px/1.4 system-ui, sans-serif; margin: 0; }
    header { display: flex; align-items: center; gap: 1rem; padding: .75rem 1rem;
             background: #14213d; color: #fff; }
    header h1 { font-size: 1rem; margin: 0; font-weight: 600; }
    #status-pill { margin-left: auto; font-size: .8rem; opacity: .85; }
    #login { padding: 2rem 1rem; }
    #login input { font-size: 1rem; padding: .4rem .6rem; width: 8rem; letter-spacing: .3em; }
    #login button { font-size: 1rem; padding: .4rem 1rem; }
    #login .err { color: #c0392b; margin-top: .5rem; min-height: 1.2em; }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: .5rem .75rem; border-bottom: 1px solid #8884; }
    th { font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; opacity: .7; }
    tr.acknowledged { opacity: .55; }
    tr.selected { background: #3498db22; }
    .crit { font-weight: 600; }
    .crit-Critical { color: #c0392b; }
    .crit-High { color: #e67e22; }
    .badge { font-size: .7rem; padding: .1rem .45rem; border-radius: 999px; border: 1px solid #8886; }
    .badge.new { background: #e67e2222; border-color: #e67e22; }
    .badge.acknowledged { background: #27ae6022; border-color: #27ae60; }
    td button { font-size: .72rem; margin-right: .25rem; padding: .15rem .5rem; }
    #empty { padding: 2rem 1rem; opacity: .6; }
    .hidden { display: none; }
    #detail { padding: 1rem; border-top: 3px solid #14213d; }
    #detail h2 { font-size: .85rem; margin: 0 0 .5rem; }
    #detail img { max-width: 100%; border: 1px solid #8884; }
    #detail pre { white-space: pre-wrap; background: #8881; padding: .75rem; border-radius: 4px;
                  max-height: 22rem; overflow: auto; }
    #detail .meta { font-size: .8rem; opacity: .7; margin-bottom: .5rem; }
    svg.spark { width: 100%; height: 120px; background: #8881; border-radius: 4px; }
    svg.spark polyline { fill: none; stroke: #e67e22; stroke-width: 2; }
    #chat { padding: 1rem; border-top: 3px solid #14213d; }
    #chat h2 { font-size: .85rem; margin: 0 0 .5rem; }
    #chat-log { display: flex; flex-direction: column; gap: .4rem; max-height: 16rem;
                overflow: auto; margin-bottom: .6rem; }
    #chat-log .msg { padding: .35rem .6rem; border-radius: 8px; max-width: 80%; }
    #chat-log .clinician { align-self: flex-end; background: #3498db22; }
    #chat-log .assistant { align-self: flex-start; background: #8881; }
    #chat-controls { display: flex; gap: .5rem; align-items: center; }
    #chat-input { flex: 1; padding: .45rem .6rem; font-size: .9rem; }
    #ptt { padding: .45rem .8rem; user-select: none; }
    #ptt.talking { background: #c0392b; color: #fff; }
  </style>
</head>
<body>
  <header>
    <h1>rmsai worklist</h1>
    <span id="room-label"></span>
    <span id="status-pill">not connected</span>
  </header>

  <section id="login">
    <label>Enter PIN to view the worklist:
      <input id="pin" type="password" inputmode="numeric" autocomplete="off" maxlength="8" />
    </label>
    <button id="login-btn">Connect</button>
    <div class="err" id="login-err"></div>
  </section>

  <main id="worklist" class="hidden">
    <div id="empty">Waiting for critical events…</div>
    <table id="table" class="hidden">
      <thead>
        <tr><th>Patient</th><th>Bed</th><th>Event</th><th>Criticality</th><th>Time</th><th>Status</th><th></th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <section id="detail" class="hidden"></section>
    <section id="chat" class="hidden">
      <h2 id="chat-title">Chat</h2>
      <div id="chat-log"></div>
      <div id="chat-controls">
        <input id="chat-input" type="text" placeholder="Ask about this patient…" autocomplete="off" />
        <button id="chat-send">Send</button>
        <button id="ptt" title="Hold to talk">🎤 Hold to talk</button>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
